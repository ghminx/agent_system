견적서_신규고객:
  title: "[(주)에스티이노베이션] 견적서 전달의 건"
  context: |
    안녕하세요, 에스티이노베이션 {send_name}입니다.

    우선 저희 회사에 관심을 갖고 문의 주셔서 감사합니다.
    요청하신 견적서를 전달 드리니 확인 부탁 드립니다. 
    견적과 관련해서 궁금하신 점은 편하게 연락 주시기 바랍니다.

    문의사항은 아래의 번호로 연락 주시기 바라며, 오늘도 좋은 하루 보내세요:)
    ({send_name} {position}, {ext})

    감사합니다.


